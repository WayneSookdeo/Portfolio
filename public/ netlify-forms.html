<!DOCTYPE html>
<html>
  <head><title>Netlify Forms Detection</title></head>
  <body>
    <!--
      This file exists purely so Netlify can detect the contact form
      during post-processing at build time. It is never shown to users.
      Required for Netlify Forms to work with Next.js / React SPAs.
    -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text"  name="name" />
      <input type="email" name="email" />
      <textarea          name="message"></textarea>
      <input type="text"  name="bot-field" />
    </form>
  </body>
</html>
